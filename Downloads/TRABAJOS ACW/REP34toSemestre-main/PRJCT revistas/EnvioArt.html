<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/EstilosInx.CSS">


</head>

<body>
    <script src="JS/USUARIO.JS"></script>
    <script>sesionactiva()</script>

    <header>
        <div name="encabezado">

            <img src="ASSETS/LOGO-ULEAM-VERTICAL (1).png" alt="" id="logoul" width="150px" height="150px">

        </div>


        <div name="navinicio" id="navegacion">
            <a href="INDEX.HTML">Inicio</a>
            <a href="REVISTAS.HTML">Revistas</a>
            <a href="EnvioArt.html">Enviar Artículo</a>
            <a href="USUARIO.HTML">Mi Cuenta</a>

        </div>

        <br size="10px">
        <br size="10px">

    </header>








    <main>

        <!-- FORMULARIO DE ENVÍO DE ARTÍCULOS -->


        <h2>Enviar Artículo</h2>

        <form action="" enctype="multipart/form-data" onsubmit="validacionEnvioRevista(this)">

            <label for="titulo">Título del Artículo:</label><br>
            <input type="text" id="titulo" name="titulo" maxlength="150" required><br><br>

            <label for="autor">Autor(es):</label><br>
            <input type="text" id="autor" name="autor" maxlength="100" required><br><br>

            <label for="universidad"></label>Universidad/Facultad:</label><br>
            <input type="text" id="universidad" name="universidad" maxlength="100" required><br><br>

            <label for="categoria">Categoría:</label><br>
            <select id="categoria" name="categoria" required>
                <option value="">Seleccione una categoría</option>
                <option value="Ciencia">Ciencia</option>
                <option value="Sociales">Sociales</option>
                <option value="Tecnología">Tecnología</option>
                <option value="Arte">Arte</option>
                <option value="Salud">Salud</option>
                <option value="Historia">Historia</option>
                <option value="Literatura">Literatura</option>
            </select><br><br>

            <label for="resumen">Resumen:</label><br>
            <textarea id="resumen" name="resumen" rows="4" cols="50" maxlength="500" required></textarea><br><br>

            <img src="ASSETS\UPLOADIMAGE.jpg" class="UPLOADIMAGE">
            <label for="archivo">Subir Archivo (PDF):</label><br>
            <input type="file" id="archivo" name="archivo" accept=".pdf" required><br><br>


            <img src="ASSETS/UPLOADIMAGE.jpg" class="UPLOADIMAGE">
            <label for="portada">Subir Portada (Imagen):</label><br>
            <input type="file" id="portada" name="portada" accept=".jpg, .jpeg, .png" required><br><br>

            <button type="submit">Enviar Artículo</button>

        </form>

        <script src="JS/VALIDACIONES_ENVIO.JS"></script>




    </main>
    <footer>
        <p>Revistas Uleam</p>
        <H5>Contacto</H5>
        <p>Av. Circunvalación Vía a San Mateo</p>
        <p>Correo electrónico : incidencias.diit@uleam.edu.ec</p>
    </footer>
</body>

</html>
