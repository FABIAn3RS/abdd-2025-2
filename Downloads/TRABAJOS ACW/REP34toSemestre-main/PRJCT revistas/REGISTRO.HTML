<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/EstilosInx.CSS">

</head>

<body>
    <header>

        <div name="encabezado">

            <img src="ASSETS/LOGO-ULEAM-VERTICAL (1).png" alt="" id="logoul" width="150px" height="150px">

        </div>

    </header>

    <main>
        <h1>Registro</h1>
        <form id="formRegistro" onsubmit=" validarregistro()">
            <label for="correo">Correo:</label>
            <input type="email" id="correo" name="correo" required> <br><br>

            <label for="contrasena">Contraseña:</label>
            <input type="password" id="contrasena" name="contrasena" required><br>
            <br>

            <label for="confirmarContrasena">Confirmar Contraseña:</label>
            <input type="password" id="confirmarContrasena" name="confirmarContrasena" required><br><br>

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required><br><br>


            <label for="birth">Fecha de Nacimiento:</label>
            <input type="date" id="birth" name="birth" required><br><br>

            <label for="cedula">Cédula:</label>
            <input type="text" id="cedula" name="cedula" maxlength="10" minlength="10" required><br><br>

            <button type="submit">Registrarse</button>
        </form>

        <br><br>



        <a href="INICIO.HTML">Iniciar Sesion</a>
    </main>
    <script src="JS/REGISTRO.JS"></script>

    <footer>

        <p>Revistas Uleam</p>
        <H5>Contacto</H5>
        <p>Av. Circunvalación Vía a San Mateo</p>
        <p>Correo electrónico : incidencias.diit@uleam.edu.ec</p>


    </footer>
</body>

</html>
